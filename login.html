<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Bar da Rua da Copa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans flex flex-col justify-center items-center p-4 border-t-8 border-yellow-400">

  <div class="w-full max-w-md bg-slate-800 p-8 rounded-2xl border-2 border-green-600 shadow-2xl space-y-6">
    <div class="text-center space-y-2">
      <h1 class="text-3xl font-black uppercase tracking-wider text-yellow-300">⚽ COPAS BAR ⚽</h1>
      <p class="text-sm text-slate-400 font-bold uppercase tracking-wide">Acesso Restrito à Equipe</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-slate-300 mb-1">E-mail de Acesso:</label>
        <input type="email" id="login-email" class="w-full p-3 bg-slate-700 border border-slate-600 rounded-lg text-white font-bold focus:border-yellow-400 focus:outline-none" placeholder="equipe@barrc.com">
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-slate-300 mb-1">Senha Secreta:</label>
        <input type="password" id="login-senha" class="w-full p-3 bg-slate-700 border border-slate-600 rounded-lg text-white font-bold focus:border-yellow-400 focus:outline-none" placeholder="••••••••">
      </div>

      <button id="btn-entrar" class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-lg uppercase tracking-wide transition-all border-b-4 border-green-800 active:border-b-0 text-lg mt-2">
        🟢 Entrar no Sistema
      </button>
    </div>
  </div>

  <script src="./supabase.js"></script>
  <script>
    document.getElementById('btn-entrar').addEventListener('click', async () => {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-senha').value;

      if (!email || !password) {
        return alert('Preencha todos os campos!');
      }

      // Desabilita o botão temporariamente
      const btn = document.getElementById('btn-entrar');
      btn.innerText = "⏳ Verificando...";
      btn.disabled = true;

      // Realiza o login usando o Supabase Auth
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password,
      });

      if (error) {
        alert('Acesso Negado: ' + error.message);
        btn.innerText = "🟢 Entrar no Sistema";
        btn.disabled = false;
        return;
      }

      // Se der certo, redireciona o usuário para a raiz (que é o Caixa/index.html)
      window.location.href = './index.html';
    });
  </script>
</body>
</html>
