<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caixa - Bar da Rua da Copa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen font-sans border-t-8 border-yellow-400 overflow-x-hidden">

  <header class="bg-green-700 p-4 shadow-lg flex justify-between items-center border-b-4 border-yellow-400">
    <h1 class="text-2xl font-black uppercase tracking-wider text-yellow-300">⚽ CAIXA - COPAS BAR ⚽</h1>
    <button onclick="togglePainelEstoque()"
      class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-lg text-sm border-b-2 border-blue-800 transition-all uppercase tracking-wider">
      ⚙️ Estoque
    </button>
  </header>

  <main class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
    <div class="bg-slate-800 p-6 rounded-xl border-2 border-green-600 shadow-2xl flex flex-col justify-between">
      <div>
        <h2 class="text-xl font-bold mb-4 text-yellow-400 uppercase tracking-wide flex justify-between items-center">
          <span>🍢 Selecione os Churrascos</span>
          <button onclick="limparContadores()"
            class="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-2 py-1 rounded transition-colors">Limpar</button>
        </h2>

        <div class="space-y-3 mb-6" id="lista-churrascos">
       </div>
      </div>

      <button id="btn-finalizar" class="w-full bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-lg uppercase tracking-wide transition-all border-b-4 border-green-800 active:border-b-0 text-lg">
        ⚽ Confirmar Pedido
      </button>
    </div>

    <div class="bg-slate-800 p-6 rounded-xl border-2 border-blue-600 flex flex-col items-center justify-center text-center shadow-2xl min-h-[450px]">
      <div id="resultado-pedido" class="hidden space-y-6 w-full">
        <h3 class="text-xl font-black text-green-400">PEDIDO GERADO COM SUCESSO!</h3>
        <div class="bg-yellow-400 text-slate-900 font-black text-4xl py-2 px-6 rounded-full inline-block shadow-md">
          SENHA: #<span id="txt-senha">00</span>
        </div>
        <p class="text-sm text-slate-300">Peça para o cliente escanear o QR Code para acompanhar a fila:</p>
        <div class="bg-white p-3 rounded-lg inline-block shadow-inner">
          <img id="img-qrcode" src="" alt="QR Code" class="w-48 h-48 mx-auto">
        </div> 
        <button id="btn-cancelar" class="w-full bg-red-600 hover:bg-red-500 text-white font-black py-3 rounded-lg uppercase tracking-wide transition-all border-b-4 border-red-800 active:border-b-0 text-lg mt-4">
          ❌ Cancelar Último Pedido
        </button>
      </div>

      <div id="placeholder-caixa" class="text-slate-500 font-bold italic">
        Aguardando finalização do próximo pedido...
      </div>
    </div>
  </main>

  <div id="gaveta-estoque" class="fixed top-0 right-0 h-full w-80 bg-slate-800 border-l-4 border-yellow-400 shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 p-6 flex flex-col justify-between overflow-y-auto">
    <div>
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-black text-yellow-400 uppercase">⚙️ Ajustar Insumos</h2>
        <button onclick="togglePainelEstoque()" class="text-slate-400 hover:text-white font-bold text-2xl">&times;</button>
      </div>

      <div class="space-y-4">
        <div class="space-y-1">
          <label class="text-sm font-bold uppercase block text-green-400">🥩 Carne</label>
          <input type="number" id="input-est-carne" class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-center text-xl font-black text-white focus:outline-none">
        </div>
        <div class="space-y-1">
          <label class="text-sm font-bold uppercase block text-green-400">🧀 Queijo</label>
          <input type="number" id="input-est-queijo" class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-center text-xl font-black text-white focus:outline-none">
        </div>
        <div class="space-y-1">
          <label class="text-sm font-bold uppercase block text-green-400">🍗 Frango</label>
          <input type="number" id="input-est-frango" class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-center text-xl font-black text-white focus:outline-none">
        </div>
        <div class="space-y-1">
          <label class="text-sm font-bold uppercase block text-green-400">👅 Língua</label>
          <input type="number" id="input-est-lingua" class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-center text-xl font-black text-white focus:outline-none">
        </div>
        <div class="space-y-1">
          <label class="text-sm font-bold uppercase block text-green-400">🍕 Calabresa</label>
          <input type="number" id="input-est-calabresa" class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-center text-xl font-black text-white focus:outline-none">
        </div>
        <div class="space-y-1">
          <label class="text-sm font-bold uppercase block text-green-400">🍤 Camarão</label>
          <input type="number" id="input-est-camarao" class="w-full p-2 bg-slate-700 border border-slate-600 rounded text-center text-xl font-black text-white focus:outline-none">
        </div>
      </div>
    </div>

    <button onclick="salvarEstoqueManual()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-black py-3 rounded-lg uppercase tracking-wider text-sm transition-colors mt-4">
      💾 Salvar Novo Estoque
    </button>
  </div>
  <script>
    let items = document.getElementById('lista-churrascos');
    items.innerHTML = '';
    const churrascos =  [
      {name:'carne',titulo:'🥩 Carne'},
      {name:'queijo',titulo:'🧀 Queijo'} ,
      {name:'frango',titulo:'🍗 Frango'} ,
      {name:'lingua',titulo:'👅 Língua'} ,
      {name:'calabresa',titulo:'🍕 Calabresa'},
      {name:'camarao',titulo:'🍤 Camarão'}
     ]
    churrascos.forEach(item => {
      items.innerHTML += `
      <div class="flex items-center justify-between p-3 bg-slate-700/50 rounded-lg border border-slate-600">
            <div>
              <span class="font-bold text-lg uppercase tracking-wide block">${item.titulo}</span>
              <span id="disponivel-${item.name}" class="text-xs text-slate-400 font-arne" class="text-xs text-slate-400 font-normal block">(Carregando...)</span>
            </div>
            <div class="flex items-center space-x-3">
              <button type="button" onclick="alterarQuantidade('${item.name}', -1)" class="w-10 h-10 bg-blue-600 hover:bg-blue-500 font-black text-xl rounded-full flex items-center justify-center border-b-2 border-blue-800 select-none">-</button>
              <span id="qtd-${item.name}" class="w-8 text-center text-xl font-black text-yellow-400">0</span>
              <button type="button" onclick="alterarQuantidade('${item.name}', 1)" class="w-10 h-10 bg-green-600 hover:bg-green-500 font-black text-xl rounded-full flex items-center justify-center border-b-2 border-green-800 select-none">+</button>
            </div>
          </div>`
    })
  </script>

  <script src="./supabase.js"></script>
<script src="./scripts/caixa.js"></script>
</body>

</html>
