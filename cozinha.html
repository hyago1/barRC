<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozinha - Bar da Rua da Copa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen font-sans border-t-8 border-green-600">

  <!-- Header -->
  <header class="bg-blue-800 p-4 shadow-lg flex justify-between items-center border-b-4 border-yellow-400">
    <h1 class="text-xl font-black uppercase tracking-wider text-yellow-300">🔥 CHURRASQUEIRA & COZINHA 🔥</h1>
    <span
      class="bg-green-600 text-white px-3 py-1 text-xs font-bold rounded-full uppercase tracking-widest animate-pulse">Realtime
      Ativo</span>
  </header>

  <!-- Grade de Pedidos Pendentes -->
  <main class="p-6">
    <div id="container-pedidos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <!-- Os Cards de Pedidos vão entrar aqui dinamicamente via JS -->
    </div>
  </main>

  <script src="./supabase.js"></script>

  <script src="./scripts/cozinhaScript.js"></script>
</body>

</html>
